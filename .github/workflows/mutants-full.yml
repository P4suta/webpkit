# Full mutation sweep of the `webpkit` product crate — the authoritative,
# whole-crate run behind the PR-scoped `--in-diff` gate in ci.yml.
#
# It is NOT a per-push gate (a full sweep is far too slow for that). Trigger it
# by hand (`workflow_dispatch`) after anything that moves code wholesale — a
# refactor that shifts line numbers, a crate merge, or a `.cargo/mutants.toml`
# edit — to confirm every surviving mutant is still a documented equivalent.
#
# Two modes (the `empty_excludes` input):
#   * false (default) — CONFIRM: sweep with the committed `.cargo/mutants.toml`.
#     A green matrix proves the ledger still covers every equivalent mutant.
#   * true            — REGENERATE: sweep with an empty `exclude_re`, so EVERY
#     surviving mutant is reported. Download the `mutants-out-shard-*` artifacts,
#     union their `missed.txt`, and rebuild the ledger's coordinates from it.
#
# The work is fanned across 8 shards (independent runners) so the wall-clock is a
# fraction of a single-runner sweep. cargo-mutants is version-pinned to match
# mise.toml and the ci.yml `mutants` job so the generated mutants are reproducible.
name: mutants-full

on:
  workflow_dispatch:
    inputs:
      empty_excludes:
        description: "Sweep with an empty exclude_re (regenerate the ledger from the survivors) instead of confirming the committed one"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sweep:
    name: sweep (shard ${{ matrix.shard }}/8)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-mutants@27.1.0,cargo-nextest
      # In regenerate mode, sweep with an empty `exclude_re` (same runner/timeout
      # knobs as `.cargo/mutants.toml`) so every survivor is reported.
      - name: select sweep config
        id: cfg
        run: |
          if [ "${{ inputs.empty_excludes }}" = "true" ]; then
            printf 'test_tool = "nextest"\nadditional_cargo_args = ["--locked"]\ntimeout_multiplier = 5.0\nminimum_test_timeout = 120.0\nexclude_re = []\n' > /tmp/sweep.toml
            echo "flag=--config /tmp/sweep.toml" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi
      # `--shard k/8` deterministically partitions the mutant list; each runner
      # tests only its slice. In confirm mode a shard fails if any mutant in its
      # slice survives and is not covered by `.cargo/mutants.toml`'s `exclude_re`.
      # PROPTEST_CASES matches the documented baseline (fast, deterministic).
      - name: mutation sweep (this shard)
        env:
          PROPTEST_CASES: "16"
        run: cargo mutants --shard ${{ matrix.shard }}/8 -p webpkit --test-tool nextest ${{ steps.cfg.outputs.flag }}
      # Preserve each shard's outcome lists (missed/caught/...) so the exclude
      # ledger can be regenerated from the aggregated `missed.txt` after a big move.
      - name: upload shard outcomes
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutants-out-shard-${{ matrix.shard }}
          path: mutants.out/
          if-no-files-found: ignore
