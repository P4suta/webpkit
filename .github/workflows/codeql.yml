# CodeQL security analysis (Advanced Setup). Scans the Rust codec source and the
# repository's own GitHub Actions workflows, uploading results to Security > Code
# scanning. Advanced (not Default) setup so the language set, query suite, and
# SHA-pinned action versions live in-repo under the same review as the code —
# matching this repo's "pin every action" convention.
#
# Languages:
#   - rust    the codec itself (build-mode: none — the only mode the Rust analysis
#             supports; it resolves the cargo workspace without a traced build).
#   - actions the workflows under .github/workflows (catches injection / unsafe
#             checkout / token-scope issues in CI YAML).
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan (Mon 03:27 UTC) so newly-published CodeQL queries run against
    # unchanged code, not only on new commits.
    - cron: "27 3 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write # upload the SARIF results to code scanning
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Broader security rule set than the default suite.
          queries: security-extended
      - name: analyze
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v3
        with:
          category: "/language:${{ matrix.language }}"
