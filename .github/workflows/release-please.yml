# Drives release PRs and tags from Conventional Commits. On main push it opens /
# updates a release PR (version bump + CHANGELOG); on merge it tags the release.
# Bump policy: feat=minor, fix/perf=patch, !/BREAKING=major (pre-1.0: see
# release-please-config.json `bump-minor-pre-major`).

name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release please
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
