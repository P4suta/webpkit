# Release automation via release-plz (https://release-plz.dev). On push to main:
#   - release-plz-pr:      opens/updates a release PR (version bump + CHANGELOG)
#                          from Conventional Commits.
#   - release-plz-release: when that PR merges, publishes newly-versioned crates to
#                          crates.io and creates the GitHub release + tag.
#                          cargo-semver-checks gates breaking API changes.
#
# Auth uses a GitHub App (no PAT, no repo-level secrets). Both jobs mint a short-
# lived installation token via actions/create-github-app-token, so release PRs are
# authored by the App and therefore DO trigger CI (GITHUB_TOKEN-authored PRs don't).
#
# Inject these into the `release` GitHub Environment (Settings > Environments):
#   - RELEASE_PLZ_APP_ID           the GitHub App's App ID
#   - RELEASE_PLZ_APP_PRIVATE_KEY  the App's private key (PEM)
# The App needs repository permissions: Contents: read/write, Pull requests:
# read/write, and must be installed on this repository.
#
# crates.io auth uses Trusted Publishing (OIDC), not a stored token: release-plz
# mints a short-lived token via `id-token: write`. Register a trusted publisher for
# each published crate on crates.io (owner P4suta, repo webpkit, workflow
# release-plz.yml, environment release).

name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Publish + GitHub release. Only fires when a release PR merge introduces a new
  # version (release_always = false). Gate publishing via the `release` environment's
  # protection rules (Settings > Environments > release > Required reviewers), not a
  # workflow flag: environment vars aren't readable in a job-level `if`.
  release-plz-release:
    name: release-plz release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # create the git tag + GitHub release
      id-token: write # crates.io Trusted Publishing (OIDC)
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  # Open/update the release PR. Same App token so the PR triggers CI.
  release-plz-pr:
    name: release-plz pr
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
