# Build `cargo doc` and deploy to GitHub Pages on push to `main`.

name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build (cargo doc)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo doc
        env:
          RUSTDOCFLAGS: -D warnings
        # Keep in sync with the `doc` job in ci.yml (PR gate, no deploy).
        run: cargo doc --workspace --no-deps
      - name: write redirect index.html (stable rustdoc has no auto-index)
        run: |
          cat > target/doc/index.html <<'HTML'
          <!doctype html><meta http-equiv="refresh" content="0; url=webpkit/index.html">
          HTML
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: target/doc

  deploy:
    name: deploy (gh-pages)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
