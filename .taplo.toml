# taplo: TOML formatter configuration.
# https://taplo.tamasfe.dev/configuration/file.html

include = ["**/*.toml"]
# `mutants.out*` and the root-anchored `mutants-*` sweep dirs mirror the same
# cargo-mutants scratch exclusion in `.gitignore`: an ad-hoc sweep writes exclude
# fragments there that are not standalone TOML, and linting that ephemeral output
# would false-fail after any local `just mutants` run.
exclude = [
    "target/**",
    "artifacts/**",
    "node_modules/**",
    "mutants.out/**",
    "mutants.out.old/**",
    "mutants-*/**",
]

[formatting]
align_entries = false
align_comments = true
array_trailing_comma = true
array_auto_expand = true
array_auto_collapse = true
compact_arrays = true
compact_inline_tables = false
column_width = 100
indent_string = "    "
trailing_newline = true
reorder_keys = false
reorder_arrays = false
allowed_blank_lines = 2
