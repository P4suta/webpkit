# typos — strict spell check across the repo. Fix typos rather than suppress
# them; keep the allowlist below to the minimum needed for codec vocabulary.

[default]
locale = "en-us"

[default.extend-words]
VP8L = "VP8L"
webp = "webp"
cwebp = "cwebp"
dwebp = "dwebp"
# `ALPH` is the WebP alpha-chunk FourCC, not a misspelling of "ALPHA".
ALPH = "ALPH"
# `WHT`/`iWHT` are the VP8 Walsh–Hadamard transform and its inverse, not "WHAT".
WHT = "WHT"
wht = "wht"
iwht = "iwht"

# Local variables in the `select` predictor: byte arrays of a/b/c.
[default.extend-identifiers]
ba = "ba"

[files]
extend-exclude = [
    "target/**",
    "artifacts/**",
    "**/*.lock",
    "**/*.snap",
    "**/*.snap.new",
    "node_modules/**",
    # Machine-generated by release-please from commit subjects; short commit
    # SHAs get split into subtokens and flagged. The source text is reviewed at
    # commit time, so exclude the derived file.
    "CHANGELOG.md",
    # Golden fixtures are binary / encoded data — never spell-checked.
    "crates/*/fixtures/**",
]

[type.toml]
extend-glob = ["*.toml"]

[type.rust]
extend-glob = ["*.rs"]
