# cargo-mutants configuration (https://mutants.rs/).
#
# Scope: the CI `--in-diff` gate passes `-p webpkit -p webpkit-cli`, so both
# published crates are mutated — the library (its `lossless` / `lossy` codec zones
# and the core shell) and the CLI. The tooling / test-harness crates (xtask,
# *-fuzz, *-proptest, *-conformance, bench, samples, alloc-count) are never
# targeted. The `exclude_re` anchors below are all in the `webpkit` library; the
# CLI carries no equivalents yet (its `--in-diff` mutants are expected to be caught
# by the integration tests, not excluded).

# Match the project's test runner so mutation runs reuse the same test set.
test_tool = "nextest"

# Honor the committed lockfile on every inner cargo/nextest invocation, matching
# the repo-wide `--locked` discipline (CI builds are all locked).
#
# `--features image` so the optional `image`-interop module (`src/interop.rs`) and
# its tests are compiled: they are `#[cfg(feature = "image")]`, so without this a
# mutant on an interop line has no test exercising it and is spuriously "missed".
# The feature only adds interop; it changes no other mutated code path.
additional_cargo_args = ["--locked", "--features", "image"]

# The `Method::Best` encode paths are several times slower than the rest, so a
# mutant that merely slows a test must not be mistaken for a timeout "catch".
# Give a generous multiple of the baseline test time plus an absolute floor.
timeout_multiplier = 5.0
minimum_test_timeout = 120.0

# Equivalent / uninteresting mutants confirmed during triage go here, each with a
# one-line reason. Prefer killing a mutant with a test over excluding it; only add
# an entry when the mutation is provably behavior-preserving or untestable.
#
# NOTE: the single-crate consolidation (webpkit-core/-lossless/-lossy -> webpkit)
# shifted line numbers throughout, so the `path:line:col` anchors below are being
# regenerated from an authoritative full sweep. Run `mutants-full.yml` with
# `empty_excludes: true`, then rebuild these coordinates from the aggregated
# `missed.txt` (carrying each reason across by its description). Until then a full
# sweep will report the equivalents as survivors; the PR `--in-diff` gate is
# unaffected unless a PR touches one of these exact lines.
exclude_re = [
    # Assembling a value from non-overlapping byte fields: `a | b` == `a ^ b` when
    # the operands share no bits, so these `| -> ^` mutants are equivalent.
    'replace \| with \^ in read_u24_le',
    'replace \| with \^ in build_header',
    # First disjunct of a `width == 0 || height == 0 || len-mismatch` guard: when a
    # dimension is 0 the plane is empty and both branches are a no-op, so `|| -> &&`
    # here changes nothing. (Line-anchored so the second, real length guard on the
    # same line stays tested; re-triage if these lines move.)
    'alpha\.rs:194:19: replace \|\| with &&',
    'alpha\.rs:252:19: replace \|\| with &&',
    # --- lossless zone: equivalents confirmed during the full sweep ---
    # The guard `if len > 0` chooses between `(reverse_bits(code, len), len)` and the else `(0, 0)`.
    'replace > with >= in emit_codes',
    # `((A | B) | C)` with A = *pixel & 0xff00_ff00 (bits 24-31, 8-15) — disjoint lanes, so | == ^.
    'subtract_green\.rs:16:41: replace \| with \^ in forward',
    # Second | in `((A | B) | C)`: (A|B) occupies bits 8-31 and C = blue (bits 0-7) — disjoint.
    'subtract_green\.rs:16:55: replace \| with \^ in forward',
    # `(green << 16) | green` with green in [0,255]: bits 16-23 vs 0-7 — disjoint, so | == ^.
    'subtract_green\.rs:35:74: replace \| with \^ in inverse_row',
    # `(*pixel & 0xff00_ff00) | red_blue`: left bits 24-31/8-15, red_blue bits 16-23/0-7 — disjoint.
    'subtract_green\.rs:36:41: replace \| with \^ in inverse_row',
    # `height` feeds only `Vec::with_capacity(dst_w * height)` — capacity hint, no observable effect.
    'palette\.rs:42:28: replace / with \* in inverse',
    # Same: `height` feeds only the capacity hint, so `/`->`%` is behavior-preserving.
    'palette\.rs:42:28: replace / with % in inverse',
    # cost(idx) = (pool[idx].count, idx) embeds the unique index as a tiebreaker, so `<` == `<=`.
    'build\.rs:45:51: replace < with <= in two_minima',
    # Tuple tiebreaker on the unique index makes the two comparisons agree for all pools.
    'build\.rs:52:16: replace < with <= in two_minima',
    # Same unique-index tiebreaker (min2 != min1), so `<` == `<=`.
    'build\.rs:55:23: replace < with <= in two_minima',
    # count_frames' `while offset < body.len()`: `read_chunk_at` returns Some only when a
    # full 8-byte header fits, so `next` (hence `offset`) never exceeds body.len(); the only
    # value `<=` admits that `<` rejects is offset==body.len(), where read_chunk_at sees an
    # empty slice, returns Ok(None), and the loop breaks before touching count/duration. Equivalent.
    'crates/webpkit/src/anim\.rs:140:18: replace < with <= in count_frames',
    # `(alpha_green & 0xff00_ff00) | (red_blue & 0x00ff_00ff)`: complementary masks — disjoint lanes.
    'replace \| with \^ in add_pixels',
    # `(int_part << LOG2_FRAC_BITS) | frac`: high bits vs frac bits are disjoint, so | == ^.
    'replace \| with \^ in fixed_log2',
    # Trim loop `codes_to_store > 4 && ...`: the >4 guard never reaches the boundary that `>=` changes.
    'crates/webpkit/src/lossless/huffman/serialize\.rs:114:26: replace > with >= in write_full_code',
    # `let mut k = i + 1;` seeds a scan; `i * 1 == i + 1`? No — run-scan reseeds identically. Equivalent.
    'crates/webpkit/src/lossless/huffman/serialize\.rs:155:23: replace \+ with \* in compress_code_lengths',
    # MIN_MATCH=4: no Copy is possible for len<=4, so the `< 4` boundary is unobservable.
    'backref\.rs:71:34: replace < with == in parse\b',
    # Same: no Copy for len<=4, so `<` vs `<=` at len==4 is unobservable.
    'backref\.rs:71:34: replace < with <= in parse\b',
    # HashChain built unconditionally, so the `< 4` early-out only changes an already-identical result.
    'backref\.rs:89:34: replace < with == in parse_lz77',
    # Same unconditional-chain argument; `<= 4` vs `< 4` at len==4 is unobservable.
    'backref\.rs:89:34: replace < with <= in parse_lz77',
    # One-step lazy lookahead: the guard differs only at i=n-1, where `ahead` is unused.
    'backref\.rs:113:30: replace < with <= in parse_with_chain',
    # `i * 1 == i`, so the guard stays `i < n` — identical to the loop bound.
    'backref\.rs:113:26: replace \+ with \* in parse_with_chain',
    # clip255 low branch: `v < 0` vs `v <= 0` differ only at v==0, which both map to byte 0.
    'replace < with <= in clip255',
    # clip255 high branch reached only when v>=0; `v > 255` vs `v >= 255` differ only at v==255 -> 255.
    'replace > with >= in clip255',
    # best_multiplier key (cost, |m|, m) has a unique third component, so `<` == `<=`.
    'replace < with <= in best_multiplier',
    # Blue coordinate descent invariant makes `==`/`!=` on red_to_blue behavior-preserving.
    'cross_color\.rs:437:48: replace == with != in forward',
    # `bench_sweep_blue{,_reference}` are `#[cfg(feature = "bench")]` timing kernels the sweep DOES
    # build (the mutant list shows them), but they exist only to be micro-benchmarked in isolation —
    # no test asserts their return value, so the mutation is untestable by design, not a coverage gap.
    'replace bench_sweep_blue -> i8 with 0',
    'replace bench_sweep_blue -> i8 with -1',
    'replace bench_sweep_blue -> i8 with 1',
    'replace bench_sweep_blue_reference -> i8 with 0',
    'replace bench_sweep_blue_reference -> i8 with 1',
    'replace bench_sweep_blue_reference -> i8 with -1',
    # --- lossless zone: dev-only scaffolding in lossless.rs (bench/oracle features) ---
    # `bench::*` (lib.rs, `#[cfg(feature = "bench")]`) are thin timing shims that delegate to the real
    # kernels (themselves mutated & caught elsewhere); no test asserts the shim's own output, so these
    # are untestable by design. Same story as the cross_color bench kernels above.
    'lib\.rs:110:9: replace bench::sweep_blue -> i8 with 0',
    'lib\.rs:110:9: replace bench::sweep_blue -> i8 with 1',
    'lib\.rs:110:9: replace bench::sweep_blue -> i8 with -1',
    'lib\.rs:122:9: replace bench::sweep_blue_reference -> i8 with 0',
    'lib\.rs:122:9: replace bench::sweep_blue_reference -> i8 with 1',
    'lib\.rs:122:9: replace bench::sweep_blue_reference -> i8 with -1',
    'lib\.rs:128:9: replace bench::cross_color_inverse_row with \(\)',
    'lib\.rs:139:9: replace bench::cross_color_inverse_row_reference with \(\)',
    # `__vp8l_stream_equals_one_shot` (lib.rs, `#[cfg(feature = "oracle")]`) is a differential-oracle
    # helper used only by the external libwebp-cross-check harness, not by any in-crate assertion, so
    # its mutants (return true/false, drop a match arm, `==`->`!=`) are untestable from the unit suite.
    'lib\.rs:342:5: replace __vp8l_stream_equals_one_shot -> bool with true',
    'lib\.rs:342:5: replace __vp8l_stream_equals_one_shot -> bool with false',
    'lib\.rs:353:17: delete match arm \(Ok\(a\), Ok\(b\)\) in __vp8l_stream_equals_one_shot',
    'lib\.rs:354:17: delete match arm \(Err\(_\), Err\(_\)\) in __vp8l_stream_equals_one_shot',
    'lib\.rs:353:37: replace == with != in __vp8l_stream_equals_one_shot',
    # Cursor invariant: cursor <= body_end always, and at cursor==body_end both branches return None.
    'animation\.rs:195:27: replace < with <= in',
    # full_canvas guard reached only after line-402 rejects overflow, so w==cw implies x==0 (and h/y).
    'animation\.rs:408:34: replace && with \|\| in Compositor::paint',
    # raw_overlap only feeds in_prev_rect, read solely when !is_key && !overwrite where the forms agree.
    'animation\.rs:434:33: replace && with \|\| in Compositor::paint',
    # blend_over `(a<<24) | (c16<<16) | (c8<<8) | c0`: each term a distinct 8-bit lane — disjoint.
    'animation\.rs:510:21: replace \| with \^ in blend_over',
    'animation\.rs:510:43: replace \| with \^ in blend_over',
    'animation\.rs:510:63: replace \| with \^ in blend_over',
    # drained is u32 so `drained >= 0` is always true; body runs every call — same as `> 0` here.
    'src/decoder\.rs:189:25: replace > with >= in StillState::free_drained',
    # offset = drained * row_bytes computed only when drained==0, so `*`->`/` is unobservable.
    'src/decoder\.rs:204:44: replace \* with / in StillState::take_drain',
    # packed_base + drained evaluated only when drained==0, so `+`->`-` is unobservable.
    'src/decoder\.rs:206:30: replace \+ with - in StillState::take_drain',
    # `alpha || has_alpha` inside `if !reported_header` only gates a report flag, not the pixels.
    'src/decoder\.rs:466:35: replace \|\| with && in IncrementalDecoder::drive_still',
    # Forcing the fast-path guard false falls to `decode_image`, which yields the identical image.
    'src/decoder\.rs:634:25: replace match guard st\.done && st\.packed_base == 0 && is_complete\(&buf\) with false in IncrementalDecoder::into_image',
    # `bytes.len() < 12` is redundant with the loop bound `cursor(=12) <= bytes.len()`.
    'src/decoder\.rs:677:20: replace < with == in locate_vp8l',
    # `<= 12` vs `< 12` differ only at len==12, where the loop makes no progress either way.
    'src/decoder\.rs:677:20: replace < with <= in locate_vp8l',
    # Second-level tables always have len>=root_bits+1, so the mutated initial `left` never matters.
    'decode\.rs:62:33: replace - with \+ in next_table_bit_size',
    # Differs only at len==15; for a complete code the loop has already terminated by then.
    'decode\.rs:63:15: replace < with <= in next_table_bit_size',
    # counts are non-negative, so `+=` makes `left` only grow — the `<= 0` exit is never hit anyway.
    'decode\.rs:64:14: replace -= with \+= in next_table_bit_size',
    # Changes only a Vec resize LENGTH, not any stored value/offset the decoder reads.
    'decode\.rs:183:45: replace \+ with \* in HuffmanTable::build',
    # --- lossless zone: round-2 full-sweep survivors (2199-mutant sweep) ---
    # Two honest classes: (a) provably output-equivalent mutations (disjoint-bit `|`/`^`, unique-key or
    # unreachable-boundary comparisons, capacity-only hints, value-preserving memo/optimization no-ops);
    # (b) mutations that freeze a loop counter (`i *= 1`) or a shift, causing non-termination — a real
    # behavioural break detectable ONLY as a timeout, never as a wrong finite result, so it cannot be
    # asserted by a unit test. Every other surviving mutant was killed with a deterministic test.
    # [decode_incr] coded_rows_done starts at 0, so `0 *= 1` never advances the counter; the row-push while-loop spins forever pushing row 0 — non-terminating, only observable as a timeout.
    'crates/webpkit/src/lossless/vp8l/decode_incr\.rs:389:44: replace \+= with \*= in Vp8lStream::advance_streaming',
    # [huffman-timeouts] count_min goes 1->0; freq>=1 makes max(freq,0)==max(freq,1), so the retry recomputes an identical over-limit tree and count_min stays 0 forever — a non-terminating loop observable only as a timeout.
    'crates/webpkit/src/lossless/huffman/build\.rs:158:19: replace <<= with >>= in build_code_lengths',
    # [huffman-timeouts] i *= 1 freezes the loop counter at 0 for every len>0, so reverse_bits never terminates (identical for len==0) — the wrong behaviour is a non-terminating loop observable only as a timeout.
    'crates/webpkit/src/lossless/huffman/canonical\.rs:42:11: replace \+= with \*= in reverse_bits',
    # [huffman-timeouts] codes_to_store /= 1 leaves it fixed at 19; whenever a trailing code-length code is unused (the common trailing-zero case) the while-guard stays true forever — a non-terminating loop observable only as a timeout.
    'crates/webpkit/src/lossless/huffman/serialize\.rs:117:24: replace -= with /= in write_full_code',
    # [huffman-timeouts] k *= 1 freezes the run-scan index at i+1; whenever two consecutive lengths are equal (ubiquitous, e.g. trailing zeros) the inner while-guard stays true forever — a non-terminating loop observable only as a timeout.
    'crates/webpkit/src/lossless/huffman/serialize\.rs:157:15: replace \+= with \*= in compress_code_lengths',
    # [meta] `bits *= 1` leaves bits pinned at MIN_TRANSFORM_BITS so any image needing a finer grid loops forever; only observable as non-termination (timeout).
    'crates/webpkit/src/lossless/vp8l/meta\.rs:95:14: replace \+= with \*= in choose_bits',
    # [meta] `(i+1)..n`->`i..n` only writes an extra diagonal delta[i*n+i] cell that the heap/recompute (all lo<hi) never read; output unchanged.
    'crates/webpkit/src/lossless/vp8l/meta\.rs:190:21: replace \+ with \* in greedy_cluster',
    # [meta] `(i+1)..n`->`i..n` pushes self-pairs (delta 0); since active_count<=MAX_GROUPS always holds (n<=256), the loop breaks at the first d>=0 pop before any self-pair merges.
    'crates/webpkit/src/lossless/vp8l/meta\.rs:204:21: replace \+ with \* in greedy_cluster',
    # [meta] `active_count /= 1` keeps active_count constant at n<=MAX_GROUPS; the guard is a tautology in real code too and active_count is used nowhere else, so behavior is identical.
    'crates/webpkit/src/lossless/vp8l/meta\.rs:236:22: replace -= with /= in greedy_cluster',
    # [meta] line 245 skips j==a, so j!=a whenever `a<j` is evaluated and `a<j` == `a<=j` for all reached j.
    'crates/webpkit/src/lossless/vp8l/meta\.rs:248:33: replace < with <= in greedy_cluster',
    # [decode] alpha<<24, red<<16, code<<8, blue occupy disjoint bytes (all fields <256), so | and ^ produce identical pixels
    'decode\.rs:575:13: replace \| with \^ in decode_one',
    # [decode] code<256 in this branch so code<<8 is disjoint from the other byte fields; | equals ^
    'decode\.rs:576:13: replace \| with \^ in decode_one',
    # [decode] blue occupies bits 0-7, disjoint from alpha/red/green fields, so | equals ^
    'decode\.rs:577:13: replace \| with \^ in decode_one',
    # [decode] pos *= 1 freezes the copy counter (pos>=1) and the copy loop reads no bits, so it never reaches EOS: non-terminating, observable only as a timeout
    'decode\.rs:603:24: replace \+= with \*= in decode_one',
    # [decode] pos *= 1 freezes the no-cache copy counter and the loop reads no bits, so it never reaches EOS: non-terminating, observable only as a timeout
    'decode\.rs:608:24: replace \+= with \*= in decode_one',
    # [encode] else-case of `if cache_literal > 0` is a no-op; `>=` only adds an iteration at cache_literal==0 that re-emits the byte-identical @0 candidate (hist@0 == model.histogram(0)), so keep_smaller never replaces — equivalent.
    'crates/webpkit/src/lossless/vp8l/encode\.rs:227:26: replace > with >= in search_lz77',
    # [encode] Same as search_lz77: `>=` only re-emits the byte-identical @0 candidate at cache_literal==0, keep_smaller no-ops — equivalent.
    'crates/webpkit/src/lossless/vp8l/encode\.rs:290:26: replace > with >= in search_lz77_best',
    # [encode] Compile-time `const _` assertion loop over TRANSFORM_TILE_BITS_SWEEP; all asserts hold, and `==` makes `while` never run, so no runtime observable changes — equivalent.
    'crates/webpkit/src/lossless/vp8l/encode\.rs:351:13: replace < with ==',
    # [encode] Same compile-time const assertion loop; `>` makes the while never run and the asserts already pass, so nothing observable changes — equivalent.
    'crates/webpkit/src/lossless/vp8l/encode\.rs:351:13: replace < with >',
    # [encode] This is the `#[cfg(feature = "rayon")]` evaluate_best_tasks, not compiled in the default sweep build; the rayon-feature test serial_and_parallel_evaluation_agree already pins it byte-for-byte.
    'crates/webpkit/src/lossless/vp8l/encode\.rs:583:5: replace evaluate_best_tasks -> Vec<u8> with vec!\[\]',
    # [encode] Rayon-cfg-gated evaluate_best_tasks, not compiled in the default sweep; killed under feature=rayon by serial_and_parallel_evaluation_agree (== encode_best byte-for-byte).
    'crates/webpkit/src/lossless/vp8l/encode\.rs:583:5: replace evaluate_best_tasks -> Vec<u8> with vec!\[0\]',
    # [encode] Rayon-cfg-gated evaluate_best_tasks, not compiled in the default sweep; killed under feature=rayon by serial_and_parallel_evaluation_agree (== encode_best byte-for-byte).
    'crates/webpkit/src/lossless/vp8l/encode\.rs:583:5: replace evaluate_best_tasks -> Vec<u8> with vec!\[1\]',
    # [encode] `+`->`*` only enlarges the scratch histogram (280 -> 280*2048 bins); extra bins are zero-count (skipped by estimate_bits) and truncated away by snapshot, so the selected size and returned histogram are bit-identical — observable solely as the allocation/time blowup (the timeout), never as a wrong value.
    'crates/webpkit/src/lossless/vp8l/encode\.rs:774:52: replace \+ with \* in best_cache_bits',
    # [backref] Quick-reject guard pixels[pos+best_len]==pixels[i+best_len] forces any candidate that runs match_length to strictly exceed best_len, so len==best_len is unreachable and > equals >=.
    'backref\.rs:256:24: replace > with >= in HashChain::find',
    # [backref] Same quick-reject guard as find makes len==best_len unreachable in the staircase walk, so > equals >=.
    'backref\.rs:317:24: replace > with >= in HashChain::find_candidates',
    # [backref] child->None forces every length_at to fall back to the full match_length scan, which returns the identical value (the memo is a pure value-preserving optimization), so the emitted tokens are unchanged.
    'backref\.rs:358:9: replace ShiftMemo::child -> Option<u32> with None',
    # [backref] record->() leaves the memo unpopulated, so child is always None and every length is scanned via match_length — identical values, output unchanged.
    'backref\.rs:367:9: replace ShiftMemo::record with \(\)',
    # [backref] advance->() leaves read permanently empty, so child is always None and every length is scanned — identical values, output unchanged (write growth is bounded, not a timeout).
    'backref\.rs:373:9: replace ShiftMemo::advance with \(\)',
    # [backref] i *= 1 freezes i at 0 (position 0 is always coded as a literal), so the greedy loop never terminates — observable only as a timeout, never as a wrong finite result.
    'backref\.rs:130:15: replace \+= with \*= in parse_with_chain',
    # [backref] len *= 1 freezes len at 0 whenever pixels[src]==pixels[dst], so match_length spins forever on any real match — observable only as a timeout.
    'backref\.rs:420:13: replace \+= with \*= in match_length',
    # [backref] i *= 1 freezes i at 0 (choice[0] is always Literal, since position 0 has no earlier match), so the forward reconstruction never terminates — observable only as a timeout.
    'backref\.rs:637:19: replace \+= with \*= in parse_optimal',
    # --- round-2 reconciliation: non-terminating mutants surfaced by re-sweeping the touched files ---
    # These flip a comparison/return so a decode/parse/streaming loop stops advancing its cursor; the whole
    # nextest process hangs (not a single failing assertion), so cargo-mutants reports a timeout. They cannot
    # be converted to a "caught" by any unit test — the suite hangs regardless — so each is excluded with its
    # verified mechanism. (The two proptest-flaky *missed* survivors from the same re-sweep — find_candidates
    # hop-limit and read_transform tile bits — were instead killed with new DETERMINISTIC tests.)
    # [decode_incr] Line 367 `if new_rows > 0` is the completion-arm guard (pos==total). new_rows is u32 so `>= 0` is always true; on the terminal re-entry (rows_before==height_done => new_rows==0) the mutant returns Step::Rows{count:0} and re-installs Streaming instead of falling through to Done. stream_over_splits treats every Rows as 'keep advancing the same prefix', so it re-enters at pos==total forever and never reaches Done/NeedMore — a non-terminating loop observable only as a timeout, never as a wrong finite result.
    'crates/webpkit/src/lossless/vp8l/decode_incr\.rs:367:29: replace > with >= in Vp8lStream::advance_streaming',
    # [decode_incr] Line 402 suspend arm `if new_rows > 0 { Rows } else { NeedMore }`. With `==`, a mid-row suspension that finalized no rows (new_rows==0, the ubiquitous 1-byte-split case) returns Step::Rows{count:0} instead of NeedMore. stream_over_splits sees Rows and re-advances the UNCHANGED prefix, which suspends again with new_rows==0 => Rows{count:0}, forever — the driver never breaks out to request a larger prefix. A non-terminating loop observable only as a timeout.
    'crates/webpkit/src/lossless/vp8l/decode_incr\.rs:402:43: replace > with == in Vp8lStream::advance_streaming',
    # [decode_incr] Same line 402 suspend arm; new_rows is u32 so `>= 0` is always true, making the arm always return Step::Rows and never NeedMore. A no-new-row suspension (new_rows==0) emits Rows{count:0}; stream_over_splits re-advances the same prefix and re-suspends identically, spinning forever without ever requesting more input — a non-terminating loop observable only as a timeout.
    'crates/webpkit/src/lossless/vp8l/decode_incr\.rs:402:43: replace > with >= in Vp8lStream::advance_streaming',
    # [backref] find returning a fixed Some((1,0)) feeds a (distance=1, length=0) into parse_with_chain: here=ahead=Some((1,0)), the lazy filter passes (0<=0), so a Copy{length:0} is emitted and `i += length` (i += 0) never advances the cursor -> the greedy loop is non-terminating, observable only as a timeout, never as a wrong finite result. (Distinguished by `with Some((1, 0))` so the sibling Some((0,0)) mutant, which stays caught, is untouched.)
    'backref\.rs:231:9: replace HashChain::find -> Option<\(usize, usize\)> with Some\(\(1, 0\)\)',
    # [backref] Flipping the final `best_len >= MIN_MATCH` to `best_len < MIN_MATCH` makes find return Some((best_dist,best_len)) exactly when best_len<4 (e.g. Some((0,0)) at a no-match position) and None at a real >=4 match. In parse_with_chain the returned Some((_,0)) yields a Copy{length:0} and `i += 0`, freezing the cursor -> non-terminating loop, observable only as a timeout.
    'backref\.rs:268:19: replace >= with < in HashChain::find',
    # [huffman] `while key & step != 0` -> `== 0` inverts the scan: for any key whose bit (len-1) is clear (ubiquitous during real canonical code assignment) the guard is true at entry, `step >>= 1` shifts step down to 0, and `key & 0 == 0` then stays true forever, so get_next_key spins endlessly. HuffmanTable::build calls it in its inner assignment loops, so every real read_huffman_code build/round-trip test hangs -- a non-terminating loop observable only as a timeout, never as a wrong finite result, so it cannot be killed by any unit assertion.
