# cargo-mutants configuration (https://mutants.rs/).
#
# Scope: the CI `--in-diff` gate passes `-p webpkit -p webpkit-cli`, so both
# published crates are mutated — the library (its `lossless` / `lossy` codec zones
# and the core shell) and the CLI. The tooling / test-harness crates (xtask,
# *-fuzz, *-proptest, *-conformance, bench, samples, alloc-count) are never
# targeted.
#
# Codec visibility: the library's internal modules (`lossless`, `lossy`, `anim`, …)
# are declared as literal `pub(crate) mod` items in `lib.rs` precisely so this tool's
# `syn` source walk descends into them. An earlier `macro_rules!`-generated mod tree
# left the whole codec invisible to the walk; the `__internals` re-exposure is now the
# only macro-generated declaration (active under a feature the sweep never builds), so
# every codec file is walked exactly once.

# Match the project's test runner so mutation runs reuse the same test set.
test_tool = "nextest"

# Honor the committed lockfile on every inner cargo/nextest invocation, matching
# the repo-wide `--locked` discipline (CI builds are all locked).
#
# `--features image` compiles the optional `image`-interop module (`src/interop.rs`)
# and its tests; without it an interop mutant has no test exercising it and is
# spuriously "missed". `--features rayon` compiles the parallel `Method::Best` /
# wavefront / row evaluators so their mutants are genuinely mutated *and* killed by
# the serial-vs-parallel byte-for-byte differential tests — rather than surviving as
# uncompiled code that then has to be excluded by hand. Neither feature changes any
# other mutated code path.
additional_cargo_args = ["--locked", "--features", "image,rayon"]

# The `Method::Best` encode paths are several times slower than the rest, so a
# mutant that merely slows a test must not be mistaken for a timeout "catch".
# Give a generous multiple of the baseline test time plus an absolute floor.
timeout_multiplier = 5.0
minimum_test_timeout = 120.0

# Equivalent / uninteresting mutants confirmed during triage go here, each with a
# one-line reason. Prefer killing a mutant with a test over excluding it; only add an
# entry when the mutation is provably behavior-preserving or untestable.
#
# Durable anchors only. cargo-mutants matches `exclude_re` against the mutant names
# from `--list` (`<path>:<line>:<col>: replace <op> … in <fn>`); anchor every entry to
# the *function / method / return type*, never to a `path:line:col` coordinate. Line
# coordinates move whenever the code around them is edited, at which point a line
# anchor silently either dangles (excludes nothing) or, worse, latches onto a
# different mutant that now occupies that line. A function-name anchor travels with
# the code. Equivalent forms:
#   'replace \| with \^ in read_u24_le'        # operator mutant, anchored by fn
#   'replace two_minima -> .* with '           # return-value mutant, anchored by fn
#   'replace <fn> with \(\) in <Type>'         # unit-return mutant, anchored by method
# For a whole function whose every mutant is untestable (a `#[cfg(feature = …)]`
# helper the default sweep does not build, or a bench timing shim with no assertion),
# a `#[cfg_attr(test, mutants::skip)]` attribute in the source is equally durable; the
# regex form is used here to keep the published crate free of even a dev-dependency.
#
# LEDGER STATUS — pending re-authoring from an authoritative full sweep.
#
# The prior ledger (see git history for the ~260 entries and their per-mutant
# reasoning) was authored against the pre-consolidation `webpkit-core` /
# `-lossless` / `-lossy` crates and anchored by `path:line:col`. Two events
# invalidated it wholesale: (1) the single-crate consolidation moved the code behind
# a `macro_rules!` mod tree that hid the entire codec from this tool, so no sweep
# since has actually mutated `lossless` / `lossy` — the "0 missed" baseline was never
# validated on the merged crate; (2) the P2–P8 campaign rewrote the lossless encoder
# (auto-Effort), the lossy psychovisual RD path, the geometry / rescaler, and the
# mux / animation layers, moving or deleting most anchored functions outright.
#
# Restoring codec visibility (above) is what lets a sweep see these zones again for
# the first time. The equivalence ledger is therefore re-derived from scratch by the
# full local sweep documented in `docs/mutation-testing.md`, NOT hand-migrated from
# stale anchors: translating ~260 unverified equivalence claims onto rewritten code
# would launder assertions no sweep has confirmed. The single entry below is the one
# equivalent re-derived so far, by the scoped `effort.rs` spot-check that seeded the
# doc's baseline; the full sweep will surface the rest (disjoint-bit `|`/`^`,
# unique-key comparisons, non-terminating-loop timeouts) and the oracle- / bench-gated
# helpers the sweep does not build, each added here with a durable anchor and reason.
exclude_re = [
    # `if n > MAX_LEVEL { MAX_LEVEL } else { n }`: `>` vs `>=` differ only at
    # n == MAX_LEVEL, where both yield MAX_LEVEL (the clamp is idempotent there), so
    # the two forms are behavior-preserving. (Spot-check verified, effort.rs sweep.)
    'replace > with >= in Effort::level',
]
